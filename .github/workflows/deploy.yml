name: Deploy DOL-EO-Management

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_IMAGE: abhinav1502/dol_eo_management
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE }}:latest
          ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to production
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      env:
        # Database Configuration
        POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
        POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        
        # Redis Configuration
        REDIS_HOST: ${{ secrets.REDIS_HOST }}
        REDIS_PORT: ${{ secrets.REDIS_PORT }}
        
        # Email Configuration
        IMAP_HOST: ${{ secrets.IMAP_HOST }}
        IMAP_USERNAME: ${{ secrets.IMAP_USERNAME }}
        IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        PMO_EMAIL_ADDRESS: ${{ secrets.PMO_EMAIL_ADDRESS }}
        
        # Application Configuration
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        APP_LOG_DIR: /app/logs
        OUTBOX_DIR: /tmp/outbox
        
        # Email Webhook
        EMAIL_WEBHOOK_ENDPOINT: ${{ secrets.EMAIL_WEBHOOK_ENDPOINT }}
        
        # Python Configuration
        PYTHONUNBUFFERED: 1
        PYTHONPATH: /app
      run: |
        # Deploy with environment variables injected at runtime
        docker-compose -f docker-compose.prod.yml up -d

    - name: Run Database Migrations
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      env:
        POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
        POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      run: |
        # Wait for services to be healthy
        sleep 30
        
        # Run database migrations
        docker-compose -f docker-compose.prod.yml run --rm migrate

    - name: Health Check
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        # Wait for application to start
        sleep 60
        
        # Check if the application is responding
        curl -f http://localhost:8000/health_check || exit 1

    - name: Cleanup old images
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        # Remove old Docker images to save space
        docker image prune -f
