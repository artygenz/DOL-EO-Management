services:
  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: dol_user
      POSTGRES_PASSWORD: artygenz
      POSTGRES_DB: dol_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dol_user", "-d", "dol_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  dol-eo-service:
    build: .
    container_name: dol-eo-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=db
      - PYTHONUNBUFFERED=1
      - IMAP_HOST=lumenlighthouse.ai
      - IMAP_USERNAME=${IMAP_USERNAME}
      - IMAP_PASSWORD=${IMAP_PASSWORD}
      - EMAIL_WEBHOOK_ENDPOINT=http://localhost:8000/api/email/webhook
      - SMTP_HOST=lumenlighthouse.ai
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - PMO_EMAIL_ADDRESS=${PMO_EMAIL_ADDRESS}
    volumes:
      - .:/app
      - ./outbox:/tmp/outbox
      - ./attachments:/app/attachments
      - ./logs:/app/logs
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health_check')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  migrate:
    build: .
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    volumes:
      - .:/app
    working_dir: /app

  pytest:
    build: .
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pytest -q tests
    volumes:
      - .:/app
    working_dir: /app


