version: "3.9"

services:

  worker:
    build: .
    command: celery -A src.workflow.celery_app worker --loglevel=info -Q ingest,ai,db,email,review
    volumes:
      - .:/app
      - ./outbox:/tmp/outbox
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=db
    depends_on:
      - redis
      - db

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

      

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: dol_user
      POSTGRES_PASSWORD: artygenz
      POSTGRES_DB: dol_db
    ports:
      - "5433:5432"

  api:
    build: .
    ports: ["8000:8000"]
    env_file:
      - .env
    depends_on: [db, redis]
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: 
      - .:/app
    working_dir: /app
    
  migrate:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    command: alembic upgrade head
    volumes:
      - .:/app
    working_dir: /app

  pytest:
    build: .
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis
    command: pytest -q tests
    volumes:
      - .:/app
    working_dir: /app

  export-db:
    image: postgres:13
    depends_on:
      - db
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        until pg_isready -h db -U dol_user -d dol_db; do sleep 2; done &&
        echo 'Exporting database data...' &&
        pg_dump -h db -U dol_user -d dol_db --data-only --inserts > /workspace/database_seed.sql &&
        echo 'Database export completed successfully!' &&
        echo 'File saved as: database_seed.sql'
      "
    environment:
      POSTGRES_PASSWORD: artygenz
      PGPASSWORD: artygenz
    volumes:
      - .:/workspace
    working_dir: /workspace

  import-db:
    image: postgres:13
    depends_on:
      - db
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        until pg_isready -h db -U dol_user -d dol_db; do sleep 2; done &&
        echo 'Importing database seed data...' &&
        psql -h db -U dol_user -d dol_db < /workspace/database_seed.sql &&
        echo 'Database import completed successfully!'
      "
    environment:
      POSTGRES_PASSWORD: artygenz
      PGPASSWORD: artygenz
    volumes:
      - .:/workspace
    working_dir: /workspace
