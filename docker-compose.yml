version: "3.9"

services:

  worker:
    build: .
    command: celery -A src.workflow.celery_app worker --loglevel=info -Q ingest,ai,db
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=db
    depends_on:
      - redis
      - db

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

      

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: dol_user
      POSTGRES_PASSWORD: artygenz
      POSTGRES_DB: dol_db
    ports:
      - "5433:5432"

  api:
    build: .
    ports: ["8000:8000"]
    env_file:
      - .env
    depends_on: [db, redis]
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: 
      - .:/app
    working_dir: /app
    
  migrate:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    command: alembic upgrade head
