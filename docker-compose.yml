services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  db:
    image: postgres:13
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: dol_db
      POSTGRES_USER: dol_user
      POSTGRES_PASSWORD: artygenz
    
  dol-eo-service:
    build: .
    container_name: dol-eo-service
    ports:
      - "8000:80"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./outbox:/tmp/outbox
      - ./attachments:/app/attachments
      - ./logs:/app/logs
    working_dir: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health_check')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

