<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Streaming Test UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .auth-section {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
        }

        .auth-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .auth-form input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .auth-form button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .auth-form button:hover {
            background: #5a6fd8;
        }

        .auth-form button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .auth-status {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .auth-status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .auth-status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
        }

        .message.user .message-avatar {
            background: #667eea;
        }

        .message.assistant .message-avatar {
            background: #28a745;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
        }

        .message.assistant .message-content.streaming {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
        }

        .message.assistant .message-content.streaming::after {
            content: '▋';
            animation: blink 1s infinite;
            color: #667eea;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .message-metadata {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            padding: 5px 8px;
            background: #f1f3f4;
            border-radius: 8px;
        }

        .chat-input {
            padding: 20px;
            border-top: 1px solid #eee;
            background: white;
        }

        .input-form {
            display: flex;
            gap: 10px;
        }

        .input-form input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }

        .input-form input:focus {
            border-color: #667eea;
        }

        .input-form button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .input-form button:hover {
            background: #5a6fd8;
        }

        .input-form button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .mode-toggle {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .mode-toggle button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .mode-toggle button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 Chat Streaming Test UI</h1>
            <p>Test the streaming chat endpoints with real-time responses</p>
        </div>

        <div class="auth-section">
            <div class="auth-form">
                <input type="email" id="email" placeholder="Email" value="jack.smith@lumenlighthouse.ai">
                <input type="password" id="password" placeholder="Password" value="Lumen@2025">
                <button onclick="login()" id="loginBtn">Login</button>
            </div>
            <div id="authStatus" class="auth-status" style="display: none;"></div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    Welcome! Please login first, then you can start chatting. I can help you with tasks, executive orders, and more!
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            Processing your request...
        </div>

        <div class="chat-input">
            <div class="mode-toggle">
                <button id="streamingMode" class="active" onclick="setMode('streaming')">🌊 Streaming</button>
                <button id="normalMode" onclick="setMode('normal')">📄 Normal</button>
            </div>
            <div class="input-form">
                <input type="text" id="messageInput" placeholder="Ask me anything about tasks, executive orders, etc..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        let accessToken = null;
        let currentMode = 'streaming';
        let currentStreamingMessage = null;

        // Set API base URL
        const API_BASE = 'http://localhost:8000';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('streamingMode').classList.toggle('active', mode === 'streaming');
            document.getElementById('normalMode').classList.toggle('active', mode === 'normal');
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const authStatus = document.getElementById('authStatus');

            if (!email || !password) {
                showAuthStatus('Please enter both email and password', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    accessToken = data.access_token;
                    document.getElementById('sendBtn').disabled = false;
                    showAuthStatus(`✅ Logged in as ${data.user.name} (${data.user.role})`, 'success');
                    addMessage('assistant', `Hello ${data.user.name}! I'm ready to help you. You can ask me about tasks, executive orders, or any other data.`);
                } else {
                    showAuthStatus(`❌ Login failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                showAuthStatus(`❌ Network error: ${error.message}`, 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        }

        function showAuthStatus(message, type) {
            const authStatus = document.getElementById('authStatus');
            authStatus.textContent = message;
            authStatus.className = `auth-status ${type}`;
            authStatus.style.display = 'block';
        }

        function addMessage(sender, content, metadata = null) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = sender === 'user' ? '👤' : '🤖';
            const avatarBg = sender === 'user' ? '#667eea' : '#28a745';
            
            messageDiv.innerHTML = `
                <div class="message-avatar" style="background: ${avatarBg}">${avatar}</div>
                <div class="message-content">${content}</div>
                ${metadata ? `<div class="message-metadata">${metadata}</div>` : ''}
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return messageDiv;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            if (!accessToken) {
                showAuthStatus('Please login first', 'error');
                return;
            }

            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if (!message) return;

            // Add user message
            addMessage('user', message);
            messageInput.value = '';

            // Show loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('sendBtn').disabled = true;

            try {
                if (currentMode === 'streaming') {
                    await sendStreamingMessage(message);
                } else {
                    await sendNormalMessage(message);
                }
            } catch (error) {
                addMessage('assistant', `❌ Error: ${error.message}`);
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('sendBtn').disabled = false;
            }
        }

        async function sendNormalMessage(message) {
            const response = await fetch(`${API_BASE}/chat/query`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${accessToken}`
                },
                body: JSON.stringify({ message })
            });

            const data = await response.json();

            if (response.ok) {
                let metadata = '';
                if (data.tool) {
                    metadata += `Tool: ${data.tool}`;
                }
                if (data.processing && data.processing.length > 0) {
                    metadata += ` | Steps: ${data.processing.length}`;
                }
                
                addMessage('assistant', data.response, metadata);
            } else {
                throw new Error(data.detail || 'Request failed');
            }
        }

        async function sendStreamingMessage(message) {
            const response = await fetch(`${API_BASE}/chat/stream`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${accessToken}`
                },
                body: JSON.stringify({ message })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || 'Request failed');
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let messageDiv = null;
            let content = '';
            let metadata = '';

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line in buffer

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'metadata') {
                                    if (data.tool) {
                                        metadata += `Tool: ${data.tool}`;
                                    }
                                    if (data.processing && data.processing.length > 0) {
                                        metadata += ` | Steps: ${data.processing.length}`;
                                    }
                                } else if (data.type === 'chunk') {
                                    if (!messageDiv) {
                                        messageDiv = addMessage('assistant', '', metadata);
                                        messageDiv.querySelector('.message-content').classList.add('streaming');
                                    }
                                    
                                    content += data.content;
                                    messageDiv.querySelector('.message-content').innerHTML = content;
                                } else if (data.type === 'complete') {
                                    if (messageDiv) {
                                        messageDiv.querySelector('.message-content').classList.remove('streaming');
                                    }
                                } else if (data.type === 'error') {
                                    throw new Error(data.message);
                                }
                            } catch (parseError) {
                                console.warn('Failed to parse SSE data:', parseError);
                            }
                        }
                    }
                }
            } finally {
                reader.releaseLock();
            }
        }

        // Initialize
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
